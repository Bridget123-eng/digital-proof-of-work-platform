$kind: http-request
method: GET
url: '{{baseUrl}}/health'
order: 1000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Health endpoint returns success status code", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 503]);
      });

      pm.test("Health endpoint returns JSON", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      const data = pm.response.json();

      pm.test("Health payload includes core fields", function () {
        pm.expect(data).to.have.property("status");
        pm.expect(data).to.have.property("service");
        pm.expect(data).to.have.property("timestamp");
        pm.expect(data).to.have.property("uptime");
        pm.expect(data).to.have.nested.property("database.status");
        pm.expect(data).to.have.nested.property("database.readyState");
      });

      pm.test("Health status is valid", function () {
        pm.expect(data.status).to.be.oneOf(["ok", "degraded"]);
      });

      pm.test("Database status is valid", function () {
        pm.expect(data.database.status).to.be.oneOf([
          "connected",
          "connecting",
          "disconnected",
          "disconnecting",
          "unknown"
        ]);
      });
